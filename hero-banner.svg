<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 480" width="1400" height="480" font-family="'Segoe UI', system-ui, Arial, sans-serif">
<defs>
  <!-- Backgrounds -->
  <radialGradient id="bgGlow" cx="40%" cy="50%" r="60%">
    <stop offset="0%" style="stop-color:#0d1f45;stop-opacity:1"/>
    <stop offset="100%" style="stop-color:#020810;stop-opacity:1"/>
  </radialGradient>
  <radialGradient id="orb1" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.25"/>
    <stop offset="60%" style="stop-color:#8b5cf6;stop-opacity:0.08"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
  </radialGradient>
  <radialGradient id="orb2" cx="50%" cy="50%" r="50%">
    <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.15"/>
    <stop offset="100%" style="stop-color:#000;stop-opacity:0"/>
  </radialGradient>

  <!-- Text gradients -->
  <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#60a5fa"/>
    <stop offset="40%" style="stop-color:#a78bfa"/>
    <stop offset="100%" style="stop-color:#f0abfc"/>
  </linearGradient>
  <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8"/>
    <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8"/>
  </linearGradient>
  <linearGradient id="accentBar" x1="0%" y1="0%" x2="100%" y2="0%">
    <stop offset="0%" style="stop-color:#3b82f6"/>
    <stop offset="50%" style="stop-color:#8b5cf6"/>
    <stop offset="100%" style="stop-color:#f59e0b"/>
  </linearGradient>

  <!-- Glow filters -->
  <filter id="glowBlue" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="6" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowSoft" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="12" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="glowText" x="-10%" y="-30%" width="120%" height="160%">
    <feGaussianBlur stdDeviation="8" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="nodeShadow">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>

  <style>
    .node { animation: pulse 3s ease-in-out infinite; }
    .node2 { animation: pulse 3s ease-in-out infinite 0.8s; }
    .node3 { animation: pulse 3s ease-in-out infinite 1.5s; }
    .node4 { animation: pulse 3s ease-in-out infinite 2.2s; }
    .ring1 { animation: spin 18s linear infinite; transform-origin: 420px 240px; }
    .ring2 { animation: spin 28s linear infinite reverse; transform-origin: 420px 240px; }
    .p1 { animation: floatUp 4s ease-in-out infinite; }
    .p2 { animation: floatUp 5s ease-in-out infinite 1s; }
    .p3 { animation: floatUp 3.5s ease-in-out infinite 2s; }
    .p4 { animation: floatUp 6s ease-in-out infinite 0.5s; }
    .p5 { animation: floatUp 4.5s ease-in-out infinite 1.8s; }
    .orbPulse { animation: orbBreath 5s ease-in-out infinite; }
    .scanLine { animation: scan 6s linear infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes floatUp {
      0%, 100% { transform: translateY(0px); opacity: 0.5; }
      50% { transform: translateY(-12px); opacity: 1; }
    }
    @keyframes orbBreath {
      0%, 100% { opacity: 0.6; r: 180; }
      50% { opacity: 1; r: 210; }
    }
    @keyframes scan {
      0% { transform: translateY(-480px); opacity: 0; }
      10% { opacity: 0.06; }
      90% { opacity: 0.06; }
      100% { transform: translateY(480px); opacity: 0; }
    }
  </style>
</defs>

<!-- ── BACKGROUND ── -->
<rect width="1400" height="480" fill="url(#bgGlow)"/>

<!-- Dot grid overlay -->
<pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
  <circle cx="20" cy="20" r="1" fill="#3b82f6" opacity="0.08"/>
</pattern>
<rect width="1400" height="480" fill="url(#dots)"/>

<!-- Scan line animation -->
<rect class="scanLine" x="0" y="0" width="1400" height="2" fill="url(#lineGrad)" opacity="0.06"/>

<!-- ── CENTRAL ORB (left side, behind network) ── -->
<circle class="orbPulse" cx="420" cy="240" r="190" fill="url(#orb1)"/>
<circle cx="1100" cy="380" r="160" fill="url(#orb2)" opacity="0.6"/>

<!-- ── NEURAL NETWORK (left side) ── -->
<!-- Connections -->
<g opacity="0.35" stroke="url(#lineGrad)" stroke-width="1" fill="none">
  <line x1="120" y1="90"  x2="260" y2="170"/>
  <line x1="260" y1="170" x2="380" y2="120"/>
  <line x1="380" y1="120" x2="530" y2="200"/>
  <line x1="120" y1="90"  x2="200" y2="290"/>
  <line x1="200" y1="290" x2="260" y2="170"/>
  <line x1="200" y1="290" x2="380" y2="350"/>
  <line x1="380" y1="350" x2="530" y2="310"/>
  <line x1="530" y1="200" x2="530" y2="310"/>
  <line x1="380" y1="120" x2="380" y2="350"/>
  <line x1="260" y1="170" x2="380" y2="350"/>
  <line x1="530" y1="200" x2="680" y2="160"/>
  <line x1="530" y1="310" x2="680" y2="380"/>
  <line x1="680" y1="160" x2="680" y2="380"/>
  <line x1="80"  y1="340" x2="200" y2="290"/>
  <line x1="80"  y1="340" x2="120" y2="90" />
  <line x1="120" y1="90"  x2="380" y2="120"/>
  <line x1="680" y1="160" x2="780" y2="240"/>
  <line x1="680" y1="380" x2="780" y2="240"/>
</g>

<!-- Brighter accent connections -->
<g opacity="0.7" stroke="#3b82f6" stroke-width="1.5" fill="none" filter="url(#glowBlue)">
  <line x1="260" y1="170" x2="380" y2="120"/>
  <line x1="380" y1="120" x2="530" y2="200"/>
  <line x1="530" y1="200" x2="680" y2="160"/>
</g>

<!-- Nodes -->
<g filter="url(#nodeShadow)">
  <!-- Large bright nodes -->
  <circle class="node"  cx="380" cy="120" r="10" fill="#60a5fa" opacity="0.9"/>
  <circle cx="380" cy="120" r="16" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.4"/>

  <circle class="node2" cx="530" cy="200" r="8"  fill="#a78bfa" opacity="0.9"/>
  <circle cx="530" cy="200" r="14" fill="none" stroke="#8b5cf6" stroke-width="1" opacity="0.4"/>

  <circle class="node3" cx="260" cy="170" r="7"  fill="#60a5fa" opacity="0.8"/>
  <circle class="node"  cx="680" cy="160" r="9"  fill="#f0abfc" opacity="0.8"/>
  <circle class="node4" cx="380" cy="350" r="7"  fill="#34d399" opacity="0.8"/>
  <circle class="node2" cx="530" cy="310" r="6"  fill="#a78bfa" opacity="0.7"/>
  <circle class="node3" cx="680" cy="380" r="7"  fill="#60a5fa" opacity="0.7"/>
  <circle class="node"  cx="200" cy="290" r="6"  fill="#fbbf24" opacity="0.8"/>
  <circle class="node4" cx="120" cy="90"  r="5"  fill="#60a5fa" opacity="0.6"/>
  <circle class="node2" cx="80"  cy="340" r="5"  fill="#a78bfa" opacity="0.6"/>
  <circle class="node3" cx="780" cy="240" r="7"  fill="#60a5fa" opacity="0.6"/>
</g>

<!-- ── ROTATING RINGS ── -->
<g class="ring1">
  <circle cx="420" cy="240" r="145" fill="none" stroke="#3b82f6" stroke-width="1"
    stroke-dasharray="8 16" opacity="0.25"/>
</g>
<g class="ring2">
  <circle cx="420" cy="240" r="200" fill="none" stroke="#8b5cf6" stroke-width="0.8"
    stroke-dasharray="4 20" opacity="0.15"/>
</g>

<!-- ── FLOATING PARTICLES (right background) ── -->
<circle class="p1" cx="950"  cy="80"  r="3" fill="#3b82f6" opacity="0.6"/>
<circle class="p2" cx="1050" cy="140" r="2" fill="#8b5cf6" opacity="0.5"/>
<circle class="p3" cx="1180" cy="60"  r="2.5" fill="#f59e0b" opacity="0.4"/>
<circle class="p4" cx="1280" cy="200" r="2" fill="#3b82f6" opacity="0.5"/>
<circle class="p5" cx="1100" cy="300" r="3" fill="#a78bfa" opacity="0.4"/>
<circle class="p1" cx="870"  cy="380" r="2" fill="#34d399" opacity="0.4"/>
<circle class="p3" cx="1320" cy="380" r="2.5" fill="#60a5fa" opacity="0.3"/>
<circle class="p2" cx="990"  cy="430" r="2" fill="#8b5cf6" opacity="0.35"/>

<!-- ── VERTICAL DIVIDER ── -->
<line x1="800" y1="60" x2="800" y2="420" stroke="url(#lineGrad)" stroke-width="1" opacity="0.2"/>

<!-- ── MAIN TEXT (right side) ── -->
<!-- Eyebrow label -->
<text x="840" y="148" font-size="12" fill="#64748b" font-weight="700" letter-spacing="4">DAILY · BILINGUAL · AI-POWERED</text>

<!-- Main title — shadow/glow layer -->
<text x="836" y="232" font-size="82" font-weight="900" fill="#3b82f6" opacity="0.15"
  letter-spacing="-2" filter="url(#glowText)">Ken's AI Daily</text>
<!-- Main title — foreground -->
<text x="836" y="228" font-size="82" font-weight="900" fill="url(#titleGrad)"
  letter-spacing="-2">Ken's AI Daily</text>

<!-- Chinese subtitle -->
<text x="840" y="276" font-size="28" fill="#94a3b8" font-weight="500" letter-spacing="6">每日 AI 資訊精選</text>

<!-- Accent underline -->
<rect x="840" y="292" width="480" height="2.5" rx="2" fill="url(#accentBar)" opacity="0.8"/>

<!-- Tagline -->
<text x="840" y="332" font-size="16" fill="#64748b" letter-spacing="1">
  Curated every morning · English + Traditional Chinese
</text>

<!-- Badge row -->
<rect x="840" y="356" width="82" height="26" rx="13" fill="rgba(59,130,246,0.12)" stroke="#3b82f6" stroke-width="1"/>
<text x="881" y="373" font-size="11" fill="#60a5fa" font-weight="700" text-anchor="middle">🇬🇧 English</text>

<rect x="934" y="356" width="82" height="26" rx="13" fill="rgba(139,92,246,0.12)" stroke="#8b5cf6" stroke-width="1"/>
<text x="975" y="373" font-size="11" fill="#a78bfa" font-weight="700" text-anchor="middle">🇹🇼 繁體中文</text>

<rect x="1028" y="356" width="110" height="26" rx="13" fill="rgba(245,158,11,0.10)" stroke="#f59e0b" stroke-width="1"/>
<text x="1083" y="373" font-size="11" fill="#fbbf24" font-weight="700" text-anchor="middle">📊 Daily Infographic</text>

<!-- ── BOTTOM ACCENT BAR ── -->
<rect x="0" y="474" width="1400" height="6" fill="url(#accentBar)" rx="0"/>

<!-- ── POWERED BY label ── -->
<text x="1380" y="462" font-size="10" fill="#334155" text-anchor="end" letter-spacing="1">POWERED BY CLAUDE AI</text>

</svg>
